<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Área de Entregas - Produto Yuba</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6f3;
      color: #263238;
    }

    .container {
      width: 90%;
      max-width: 430px;
      margin: 60px auto;
      padding: 30px 24px;
      box-sizing: border-box;
      text-align: center;
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.10);
    }

    h1 {
      margin-bottom: 5px;
      color: #2e7d32;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 30px;
      font-size: 20px;
      font-weight: normal;
    }

    input {
      width: 100%;
      padding: 15px;
      box-sizing: border-box;
      border: 1px solid #b0bec5;
      border-radius: 10px;
      font-size: 16px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #2e7d32;
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #256428;
    }

    #resultado {
      margin-top: 22px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      background: #e8f5e9;
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>Área de Entregas</h1>
    <h2>Produto Yuba</h2>

    <input
      id="endereco"
      type="text"
      placeholder="Digite seu endereço"
    >

    <button type="button" onclick="calcularFrete()">
      Calcular frete
    </button>

    <div id="resultado"></div>
  </main>

  <script>
    function calcularFrete() {
      const endereco = document.getElementById("endereco").value.trim();
      const resultado = document.getElementById("resultado");

      if (endereco === "") {
        resultado.style.display = "block";
        resultado.innerHTML = "Digite um endereço para continuar.";
        return;
      }

      resultado.style.display = "block";
      resultado.innerHTML =
        "<strong>Endereço recebido:</strong><br>" +
        endereco +
        "<br><br>O cálculo real do frete será adicionado na próxima etapa.";
    }
  </script>
</body>
</html>
